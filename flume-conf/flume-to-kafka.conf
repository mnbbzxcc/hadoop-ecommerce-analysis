# Agent 名称
agent.sources = s1 s2
agent.channels = c1
agent.sinks = k1

# ===== Source1: spooldir 监控目录（历史CSV文件） =====
agent.sources.s1.type = spooldir
agent.sources.s1.spoolDir = /flume/data
agent.sources.s1.fileHeader = false
agent.sources.s1.deletePolicy = never
# 忽略 .tmp 文件和 user_behavior.log
agent.sources.s1.ignorePattern = ^(.)*\.tmp$|user_behavior\.log
agent.sources.s1.basenameHeader = true
agent.sources.s1.basenameHeaderKey = filename

# 拦截器：过滤空行
agent.sources.s1.interceptors = i1
agent.sources.s1.interceptors.i1.type = regex_filter
agent.sources.s1.interceptors.i1.regex = ^\\s*$
agent.sources.s1.interceptors.i1.excludeEvents = true
agent.sources.s1.channels = c1

# ===== Source2: taildir 监控实时追加的日志文件 =====
agent.sources.s2.type = taildir
agent.sources.s2.positionFile = /opt/flume/data/taildir_position.json
agent.sources.s2.filegroups = f1
agent.sources.s2.filegroups.f1 = /flume/data/user_behavior.log
agent.sources.s2.batchSize = 100
agent.sources.s2.channels = c1

# ===== Channel: memory =====
agent.channels.c1.type = memory
agent.channels.c1.capacity = 10000
agent.channels.c1.transactionCapacity = 1000

# ===== Sink: Kafka =====
agent.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.k1.kafka.topic = user-behavior
agent.sinks.k1.kafka.bootstrap.servers = kafka:9092
agent.sinks.k1.kafka.flumeBatchSize = 100
agent.sinks.k1.kafka.producer.acks = 1
agent.sinks.k1.kafka.producer.linger.ms = 5
agent.sinks.k1.kafka.producer.compression.type = snappy
agent.sinks.k1.channel = c1

# ===== 绑定 =====
# source 已绑定 channel，sink 也已绑定