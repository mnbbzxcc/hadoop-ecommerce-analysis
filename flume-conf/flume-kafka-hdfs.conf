# Flume Agent 名称
agent.sources = kafkaSource
agent.channels = fileChannel
agent.sinks = hdfsSink

# ==================== Kafka Source ====================
agent.sources.kafkaSource.type = org.apache.flume.source.kafka.KafkaSource
agent.sources.kafkaSource.kafka.bootstrap.servers = kafka:9092
agent.sources.kafkaSource.kafka.topics = user-behavior
agent.sources.kafkaSource.kafka.consumer.group.id = flume-hdfs-group
agent.sources.kafkaSource.kafka.consumer.auto.offset.reset = earliest
agent.sources.kafkaSource.batchSize = 1000
agent.sources.kafkaSource.channels = fileChannel

# 关闭自动提交偏移量，防止数据丢失
agent.sources.kafkaSource.kafka.consumer.enable.auto.commit = false

# 拦截器：提取时间戳用于 HDFS 分区
agent.sources.kafkaSource.interceptors = tsExtractor
agent.sources.kafkaSource.interceptors.tsExtractor.type = com.example.flume.interceptor.TimestampExtractor$Builder

# ==================== File Channel ====================
agent.channels.fileChannel.type = file
agent.channels.fileChannel.checkpointDir = /opt/flume/checkpoint
agent.channels.fileChannel.dataDirs = /opt/flume/data
agent.channels.fileChannel.capacity = 5000000
agent.channels.fileChannel.transactionCapacity = 10000

# ==================== HDFS Sink ====================
agent.sinks.hdfsSink.type = hdfs
agent.sinks.hdfsSink.hdfs.path = hdfs://namenode:8020/user/flume/behavior/dt=%{timestamp}
agent.sinks.hdfsSink.hdfs.filePrefix = event
agent.sinks.hdfsSink.hdfs.fileSuffix = .log
agent.sinks.hdfsSink.hdfs.inUsePrefix = 
agent.sinks.hdfsSink.hdfs.rollInterval = 60
agent.sinks.hdfsSink.hdfs.rollSize = 134217728
agent.sinks.hdfsSink.hdfs.rollCount = 10000
agent.sinks.hdfsSink.hdfs.batchSize = 1000
agent.sinks.hdfsSink.hdfs.writeFormat = Text
agent.sinks.hdfsSink.hdfs.fileType = DataStream
agent.sinks.hdfsSink.hdfs.useLocalTimeStamp = false
agent.sinks.hdfsSink.hdfs.callTimeout = 60000
agent.sinks.hdfsSink.channel = fileChannel